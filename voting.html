<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cast Vote • Modern UI</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Centralized CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">🗳️ Online Voting</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="voters.html">Voters</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="candidates.html">Candidates</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="voting.html">Voting</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="results.html">Results</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Voting Section -->
<div class="container mt-5">
  <h2 class="text-center title mb-4">Cast Your Vote</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="vote-card">
        <form id="voteForm">
          <div class="mb-4">
            <label class="form-label">Voter ID</label>
            <input type="number" id="voterId" class="form-control" placeholder="Enter your voter ID" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Choose Candidate</label>
            <select id="candidateSelect" class="form-select" required></select>
          </div>
          <button type="submit" class="btn btn-vote w-100">Submit Vote</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Votes Table -->
  <div class="mt-5 mb-5">
    <h3 class="text-center title mb-3">All Votes Cast</h3>
    <div class="vote-card table-container">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Voter ID</th>
            <th>Candidate ID</th>
          </tr>
        </thead>
        <tbody id="votesTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/voting.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
