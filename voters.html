<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voter Registration • Modern UI</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Centralized CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<!-- Background blobs -->
<div class="blob one"></div>
<div class="blob two"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">🗳️ Online Voting</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="voters.html">Voters</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="candidates.html">Candidates</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="voting.html">Voting</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="results.html">Results</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Registration Form -->
<div class="container mt-5 position-relative">
  <h2 class="text-center title mb-4">Voter Registration</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="glass p-5">
        <form id="voterForm">
          <div class="mb-4">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="john@email.com" required>
          </div>
          <button type="submit" class="btn btn-modern w-100">Register Now</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Registered Voters Table -->
<div class="container mt-5 mb-5">
  <h3 class="text-center title mb-3">Registered Voters</h3>
  <div class="glass p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="votersContainer"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/voters.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
