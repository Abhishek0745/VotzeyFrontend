<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candidate Management • Modern UI</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Central CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">🗳️ Online Voting</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="voters.html">Voters</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="candidates.html">Candidates</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="voting.html">Voting</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="results.html">Results</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Candidate Registration -->
<div class="container mt-5">
  <h2 class="text-center title mb-4">Candidate Registration</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="glass">
        <form id="candidateForm">
          <div class="mb-4">
            <label class="form-label">Candidate Name</label>
            <input type="text" id="candidateName" class="form-control" placeholder="Candidate full name" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Party</label>
            <input type="text" id="party" class="form-control" placeholder="Political party" required>
          </div>
          <button type="submit" class="btn btn-modern w-100">Register Candidate</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Candidate List -->
<div class="container mt-5 mb-5">
  <h3 class="text-center title mb-3">Registered Candidates</h3>
  <div class="glass p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Party</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="candidatesContainer"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/candidates.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
